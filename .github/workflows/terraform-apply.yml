name: Terraform — Production

on:
  push:
    branches: [main]
    paths:
      - "environments/prod/**"
      - "modules/**"
      - ".github/workflows/terraform-apply.yml"
  pull_request:
    branches: [main]
    paths:
      - "environments/prod/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      action:
        description: "plan ou apply"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]

permissions:
  id-token: write   # necessário para OIDC
  contents: read
  pull-requests: write  # para comentar o plan no PR

env:
  AWS_REGION:     us-east-1
  TF_WORKING_DIR: environments/prod

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan (PR)' || (github.event.inputs.action == 'apply' && 'Apply' || 'Plan') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_rds_password:   ${{ secrets.RDS_PASSWORD }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # Posta o plan como comentário no PR
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncado)' : plan;
            const body = `## Terraform Plan — Production\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # Apply: apenas em push no main OU workflow_dispatch com action=apply
      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_rds_password:   ${{ secrets.RDS_PASSWORD }}
        run: terraform apply -auto-approve tfplan
